name: Rust

on:
  pull_request:
    branches: [ "*" ]
  workflow_call:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --check --verbose
      - name: Run tests with no default features
        run: cargo test --no-default-features --verbose
      - name: Check alloc
        run: cargo check --no-default-features --features alloc --verbose
      - name: Lint default feature set
        run: cargo clippy --all-targets --verbose
      - name: Run tests default feature set
        run: cargo test --verbose
      - name: Run tests with fma
        run: cargo test --features fma --verbose
